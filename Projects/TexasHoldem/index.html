<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texas Hold'em Learning Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Texas Hold'em Learning Simulator</h1>
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">Bankroll:</span>
                    <span id="bankroll" class="stat-value">$1000</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Hands:</span>
                    <span id="handsPlayed" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Win Rate:</span>
                    <span id="winRate" class="stat-value">0%</span>
                </div>
            </div>
        </header>

        <div class="game-container">
            <div class="opponents-area">
                <div class="opponent" id="opponent1">
                    <div class="opponent-info">
                        <span class="opponent-name">Bot Alex</span>
                        <span class="opponent-stack">$500</span>
                    </div>
                    <div class="opponent-cards" id="opponent1-cards"></div>
                    <div class="opponent-status" id="opponent1-status"></div>
                </div>
                <div class="opponent" id="opponent2">
                    <div class="opponent-info">
                        <span class="opponent-name">Bot Sarah</span>
                        <span class="opponent-stack">$500</span>
                    </div>
                    <div class="opponent-cards" id="opponent2-cards"></div>
                    <div class="opponent-status" id="opponent2-status"></div>
                </div>
                <div class="opponent" id="opponent3">
                    <div class="opponent-info">
                        <span class="opponent-name">Bot Mike</span>
                        <span class="opponent-stack">$500</span>
                    </div>
                    <div class="opponent-cards" id="opponent3-cards"></div>
                    <div class="opponent-status" id="opponent3-status"></div>
                </div>
            </div>

            <div class="poker-table">
                <div class="community-cards" id="communityCards"></div>
                <div class="pot-area">
                    <div class="pot-label">Pot:</div>
                    <div class="pot-amount" id="potAmount">$0</div>
                </div>
                <div class="current-bet" id="currentBet"></div>
                <div class="learning-cue" id="learningCue"></div>
            </div>

            <div class="player-area">
                <div class="player-cards" id="playerCards"></div>
                <div class="player-info">
                    <span class="player-name">You</span>
                    <span class="player-stack" id="playerStack">$1000</span>
                </div>
                <div class="hand-rank" id="handRank"></div>
            </div>
        </div>

        <div class="controls">
            <button id="newGameBtn" class="btn btn-primary">New Game</button>
            <button id="foldBtn" class="btn btn-secondary">Fold</button>
            <button id="checkBtn" class="btn btn-secondary">Check</button>
            <button id="callBtn" class="btn btn-secondary">Call</button>
            <button id="raiseBtn" class="btn btn-secondary">Raise</button>
            <div class="raise-controls">
                <label for="raiseAmount">Raise to:</label>
                <input type="number" id="raiseAmount" value="20" min="0">
            </div>
        </div>

        <div class="learning-panel">
            <h3>Learning Tips</h3>
            <div id="learningTips" class="tips-container">
                <p class="tip">Click "New Game" to start playing. The learning tips will appear during your turn!</p>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
